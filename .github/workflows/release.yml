on:
  push:
    tags:
      - "202*"

name: Create Release

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build release notes
        id: notes
        run: |
          PREVIOUS=$(git describe --abbrev=0 --tags $(git rev-list --tags --skip=1 --max-count=1))
          python3 automation/scripts/build_release_notes.py \
            --previous "$PREVIOUS" \
            --current "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --site-url "https://iamtrail.com" \
            --output release-notes.md \
            --title-output release-title.txt
          echo "title=$(cat release-title.txt)" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ steps.notes.outputs.title }}
          body_path: release-notes.md
