name: "[Prod] IAMTrail - Endpoint Monitor"

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

env:
  project: "mamip"
  aws_region: "eu-west-1"
  dynamodb_table: "iamtrail-endpoint-changes"

permissions:
  id-token: write
  contents: write
  actions: write

jobs:
  check-endpoints:
    name: "Check Botocore Endpoints"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run endpoint diff check
        id: check
        run: node automation/scripts/check-endpoints.js

      - name: Configure AWS credentials
        if: steps.check.outputs.CHANGES_DETECTED == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ env.aws_region }}
          role-to-assume: ${{ secrets.ROLE_TO_ASSUME }}
          role-duration-seconds: 900
          role-session-name: GH-Actions-EndpointMonitor

      - name: Write changes to DynamoDB
        if: steps.check.outputs.CHANGES_DETECTED == 'true'
        run: |
          echo "$ENDPOINT_DYNAMO_ITEMS" | jq -c '.[]' | while read -r item; do
            detected_date=$(echo "$item" | jq -r '.detected_date')
            change_id=$(echo "$item" | jq -r '.change_id')
            change_type=$(echo "$item" | jq -r '.change_type')
            partition=$(echo "$item" | jq -r '.partition')
            identifier=$(echo "$item" | jq -r '.identifier')
            description=$(echo "$item" | jq -r '.description')
            commit_url=$(echo "$item" | jq -r '.botocore_commit_url')
            detected_at=$(echo "$item" | jq -r '.detected_at')

            aws dynamodb put-item \
              --table-name "${{ env.dynamodb_table }}" \
              --item "{
                \"detected_date\": {\"S\": \"$detected_date\"},
                \"change_id\": {\"S\": \"$change_id\"},
                \"change_type\": {\"S\": \"$change_type\"},
                \"partition\": {\"S\": \"$partition\"},
                \"identifier\": {\"S\": \"$identifier\"},
                \"description\": {\"S\": \"$description\"},
                \"botocore_commit_url\": {\"S\": \"$commit_url\"},
                \"detected_at\": {\"S\": \"$detected_at\"}
              }" \
              --region "${{ env.aws_region }}" || echo "Warning: Failed to write $change_id to DynamoDB"
          done

      - name: Send Discord notification
        if: steps.check.outputs.CHANGES_DETECTED == 'true'
        run: |
          WEBHOOK_URL="${{ secrets.DISCORD_WEBHOOK_URL }}"
          if [ -z "$WEBHOOK_URL" ]; then
            echo "No Discord webhook URL configured, skipping notification"
            exit 0
          fi

          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          PAYLOAD=$(jq -n \
            --arg title "Endpoint Changes Detected - $ENDPOINT_SUMMARY" \
            --arg desc "$ENDPOINT_DISCORD_DESC" \
            --arg count "$ENDPOINT_CHANGE_COUNT" \
            --arg url "https://iamtrail.com/endpoints" \
            --arg ts "$TIMESTAMP" \
            '{
              "embeds": [{
                "title": $title,
                "description": $desc,
                "url": $url,
                "color": 3447003,
                "footer": {"text": "IAMTrail - Endpoint Monitor"},
                "timestamp": $ts
              }]
            }')

          curl -s -o /dev/null -H "Content-Type: application/json" \
            -d "$PAYLOAD" "$WEBHOOK_URL" || echo "Warning: Discord notification failed"

      - name: Send public Discord notification
        if: steps.check.outputs.CHANGES_DETECTED == 'true'
        run: |
          PUBLIC_URL=$(aws ssm get-parameter --name "/iamtrail/discord-public-webhook-url" --with-decryption --region "${{ env.aws_region }}" --query 'Parameter.Value' --output text 2>/dev/null || true)
          if [ -z "$PUBLIC_URL" ]; then
            echo "No public Discord webhook in SSM, skipping"
            exit 0
          fi
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          PAYLOAD=$(jq -n \
            --arg title "Endpoint changes - $ENDPOINT_SUMMARY" \
            --arg desc "$ENDPOINT_DISCORD_DESC" \
            --arg url "https://iamtrail.com/endpoints" \
            --arg ts "$TIMESTAMP" \
            '{
              embeds: [{
                title: $title,
                description: $desc,
                url: $url,
                color: 3447003,
                footer: {text: "iamtrail.com"},
                timestamp: $ts
              }]
            }')
          curl -s -o /dev/null -H "Content-Type: application/json" \
            -d "$PAYLOAD" "$PUBLIC_URL" || echo "Warning: Public Discord notification failed"

      - name: Post to Bluesky (@iamtrail.bsky.social)
        if: steps.check.outputs.CHANGES_DETECTED == 'true'
        run: |
          aws sqs send-message \
            --queue-url "https://sqs.eu-west-1.amazonaws.com/567589703415/qbsky-mamip-prod-sqs-queue.fifo" \
            --message-body "[Endpoints] ${{ env.ENDPOINT_MESSAGE }}" \
            --message-group-id 1 \
            --region "${{ env.aws_region }}"

      # TODO(X-API): Re-enable if X offers viable free tier or paid credits.
      # - name: Post to X/Twitter (@mase_aws)
      #   if: steps.check.outputs.CHANGES_DETECTED == 'true'
      #   continue-on-error: true
      #   run: |
      #     python3 automation/scripts/x_poster.py \
      #       --secret "iamtrail/social/mase" \
      #       --region "${{ env.aws_region }}" \
      #       "${{ env.ENDPOINT_MESSAGE }}"

      - name: Commit and push changes
        if: steps.check.outputs.CHANGES_DETECTED == 'true'
        run: |
          git config --local user.email "iamtrail-bot@noreply.github.com"
          git config --local user.name "IAMTrail Endpoint Monitor"
          git add data/endpoints.json data/endpoint-changes/
          git commit -m "endpoints: ${{ env.ENDPOINT_SUMMARY }}"
          git push origin master

      - name: Trigger website deployment
        if: steps.check.outputs.CHANGES_DETECTED == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh workflow run deploy-cloudfront.yml --ref master
